- apiGroups:
  - gcp.managed.openshift.io
  resources:
  - projectclaims
  - projectclaims/status
  - projectclaims/finalizers
  - projectreferences
  - projectreferences/status
  - projectreferences/finalizers
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
