apiVersion: manifests.package-operator.run/v1alpha1
kind: PackageManifest
metadata:
  name: gcp-project-operator
  annotations:
    name: annotation
spec:
  scopes:
  - Cluster
  phases:
  - name: crds
  - name: namespace
  - name: rbac
  - name: deploy
  - name: cleanup-rbac
  - name: cleanup-deploy
  availabilityProbes:
  - probes:
    - condition:
        type: Available
        status: 'True'
    - fieldsEqual:
        fieldA: .status.updatedReplicas
        fieldB: .status.replicas
    selector:
      kind:
        group: apps
        kind: Deployment
  config:
    openAPIV3Schema:
      properties:
        image:
          description: Operator image to deploy
          type: string
          default: None
        billingAccount:
          description: GCP billing account ID
          type: string
        parentFolderID:
          description: GCP parent folder ID for project organization
          type: string
        ccsConsoleAccess:
          description: Console access configuration (YAML array format)
          type: string
        disabledRegions:
          description: Regions where project creation is disabled (YAML array format)
          type: string
    type: object
